spring.application.name=incidentmanager
server.servlet.context-path=/api/v1

# Debug
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# PostgreSQL Configuration
spring.datasource.url=${PGSQL_URL}
spring.datasource.username=${PGSQL_USER}
spring.datasource.password=${PGSQL_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Open API (Swagger)
springdoc.packages-to-scan=com.rodrigues.heric.incidentmanager.controller
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

springdoc.swagger-ui.display-query-params=true
springdoc.swagger-ui.config-url=/api/v1/api-docs/swagger-config
springdoc.swagger-ui.url=/api/v1/api-docs

springdoc.model-and-view-allowed=false
springdoc.override-with-generic-response=true